<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src=""></script>
    <script src=""></script>
    <title>Document</title>
</head>
<body>
    <header>
        <img src="https://logodownload.org/wp-content/uploads/2019/08/senai-logo-1.png" alt="" class="logo">
        <h3>MONITORAMENTO INDUSTRIAL</h3>
        <ul>
            <li>TEMPERATURA</li>
            <li>UMIDADE</li>
            <li>VIBRAÇÃO</li>
            <li>STATUS</li>
        </ul>
        <button id="toggleMachineBtn">Ligar/Desligar</button>
        <button onclick="MudarFundo()">MODO</button>
    </header>
    <main>
        <div class="container">
            <div class="temp">
                <h2>Temperatura</h2>
                <p class="value" id="tempValue"></p>
            </div>
            <div class="umid">
                <h2>Umidade</h2>
                <p class="value" id="umidValue"></p>
            </div>
            <div class="vib">
                <h2>Vibração</h2>
                <p class="value" id="vibValue"></p>
            </div>
            <div class="stt">
                <h2>Status</h2>
                <p class="value" id="sttValue"></p>
            </div>
        </div>
        <div class="cont">
            <div class="chart-container">
                <canvas id="graficoTemperatura" class="grafico"></canvas>
            </div>
            <h2>Última Atualização</h2>
            <p class="value"><span id="ultimaAtualizacao">--</span></p>
            <h3>Histórico</h3>
            <ul id="historico"></ul>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="./main.js"></script>
    <canvas id="graficoTemperatura"></canvas>
</body>
</html>
